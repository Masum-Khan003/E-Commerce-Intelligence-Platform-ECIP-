# observability/prometheus/prometheus.yml
# E-CIP v3.0 — Prometheus scrape config

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alertmanager_rules.yml

scrape_configs:
  - job_name: ecip_api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
